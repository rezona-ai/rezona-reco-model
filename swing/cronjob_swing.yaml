apiVersion: batch/v1
kind: CronJob
metadata:
  name: swing-i2i-build
  namespace: production
spec:
  schedule: "30 4 * * *"        # 04:30 UTC，独立于 two_tower_lite 流水线
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: recoleaf

          containers:
          - name: swing
            image: us-east1-docker.pkg.dev/rezonaai/reco-model/ml-trainer:latest
            imagePullPolicy: Always
            command: ["python", "/app/swing/run.py"]

            env:
            - name: GCS_BUCKET
              value: "rezona-ml"
            - name: GCS_SLIM_PREFIX
              value: "swing/slim"
            - name: GCS_ARTIFACTS_PREFIX
              value: "swing/artifacts"
            - name: BQ_PROJECT
              value: "rezonaai"
            - name: BQ_TABLE
              value: "rezonaai.datalake.reco_labeled_log_flat"
            - name: BQ_WHERE
              value: "context_info.realshow = TRUE"
            - name: SWING_DAYS
              value: "18"

            resources:
              requests:
                cpu: "2"
                memory: "8Gi"
              limits:
                cpu: "4"
                memory: "16Gi"
