apiVersion: batch/v1
kind: CronJob
metadata:
  name: coarse-ranking-features
  namespace: production
spec:
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: recoleaf

          containers:
          - name: features
            image: gcr.io/rezonaai/coarse-ranking-trainer:latest
            imagePullPolicy: Always
            command: ["python", "/app/pull_and_build.py"]

            env:
            - name: GCS_BUCKET
              value: "rezona-ml"
            - name: GCS_ARTIFACTS_PREFIX
              value: "coarse-ranking/artifacts"
            - name: GCS_RAW_PREFIX
              value: "coarse-ranking/raw"
            - name: BQ_PROJECT
              value: "rezonaai"
            - name: BQ_TABLE
              value: "rezonaai.datalake.reco_labeled_log_flat"
            # TRAIN_DAYS / TEST_DAYS 留空 → 自动滚动窗口（最近13天/昨天）

            resources:
              requests:
                cpu: "2"
                memory: "8Gi"
              limits:
                cpu: "4"
                memory: "16Gi"
